version: "2"

linters:
  default: standard
  enable:
    - fatcontext # contexts rebuilt/nested inside loops
    - gocognit   # cognitive complexity ceiling
    - wsl_v5     # whitespace/cuddling discipline
  settings:
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
    gocognit:
      min-complexity: 25
    errcheck:
      # Best-effort cleanup paths where the error is deliberately dropped:
      # deferred rollbacks/closes and writes to http.ResponseWriter.
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.DB).Close
        - (net.Conn).Close
        - (*golang.org/x/crypto/ssh.Client).Close
        - (*github.com/wlix13/orrery/collector/internal/xray.Client).Close
        - (*github.com/wlix13/orrery/collector/internal/sshdial.Dialer).Close
        - (github.com/wlix13/orrery/collector/internal/store.Store).Close
        - (*github.com/wlix13/orrery/collector/internal/store/sqlite.Store).Close
        - (*github.com/wlix13/orrery/collector/internal/store/mongo.Store).Close
        - fmt.Fprint
        - fmt.Fprintf
  exclusions:
    generated: lax
    paths:
      - internal/xray/command # vendored Xray protobuf stubs

formatters:
  enable:
    - gofmt
