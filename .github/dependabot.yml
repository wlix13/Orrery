version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /collector
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    groups:
      go:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
    commit-message:
      prefix: chore
      include: scope
    groups:
      dashboard:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /dashboard/worker
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
    commit-message:
      prefix: chore
      include: scope
    groups:
      worker:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
    commit-message:
      prefix: chore
      include: scope
    groups:
      docs:
        patterns: ["*"]
